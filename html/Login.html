
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makeup Store Auth</title>

<style>
:root {
    --bg: #FAF7F2;
    --primary: #671D2D;
    --accent: #E2C2C6;
    --text: #2A1B18;
    --white: #ffffff;
}

/* BODY */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #FAF7F2, #E2C2C6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    background: var(--white);
    padding: 35px;
    border-radius: 18px;
    width: 360px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);

    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* TITLE */
h2 {
    margin-bottom: 5px;
    color: var(--primary);
}

.subtitle {
    font-size: 13px;
    margin-bottom: 15px;
    color: gray;
}

/* FORM */
form {
    width: 100%;
}

.form-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* INPUT */
input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--accent);
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 5px rgba(103,29,45,0.3);
    outline: none;
}

/* ✅ FIX FOR PASSWORD ALIGNMENT */
.password-wrapper {
    position: relative;
    width: 100%;
}

.password-wrapper input {
    width: 100%;
    box-sizing: border-box;
}

/* TOGGLE ICON */
.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 14px;
    color: var(--primary);
    user-select: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: var(--text);
}

/* TOGGLE TEXT */
.toggle {
    margin-top: 15px;
    font-size: 14px;
    color: var(--primary);
    cursor: pointer;
}

/* MESSAGE */
.message {
    margin-top: 12px;
    font-size: 13px;
}

.error { color: red; }
.success { color: green; }

</style>
</head>

<body>

<div class="container">
    <h2 id="title">Welcome Back</h2>
    <div class="subtitle" id="subtitle">Login to your account</div>

    <form id="form">
        <div class="form-content">

            <input type="text" id="username" placeholder="Username" required>

            <input type="email" id="email" placeholder="Email" style="display:none;">

            <!-- PASSWORD -->
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="password-wrapper" id="confirmWrapper" style="display:none;">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁</span>
            </div>

            <button type="submit" id="submitBtn">Login</button>

        </div>
    </form>

    <div class="toggle" onclick="toggleForm()">
        Don't have an account? Sign Up
    </div>

    <div id="message" class="message"></div>
</div>

<script>
let isLogin = true;
let users = [];

function toggleForm() {
    isLogin = !isLogin;

    document.getElementById("title").innerText = isLogin ? "Welcome Back" : "Create Account";
    document.getElementById("subtitle").innerText = isLogin ? "Login to your account" : "Sign up to get started";

    document.getElementById("email").style.display = isLogin ? "none" : "block";
    document.getElementById("confirmWrapper").style.display = isLogin ? "none" : "block";

    document.getElementById("submitBtn").innerText = isLogin ? "Login" : "Sign Up";

    document.querySelector(".toggle").innerText = isLogin
        ? "Don't have an account? Sign Up"
        : "Already have an account? Login";

    clearMessage();
}

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (isLogin) {
        login(username, password);
    } else {
        signup(username, email, password, confirmPassword);
    }
});

function signup(username, email, password, confirmPassword) {

    if (password !== confirmPassword) {
        showMessage("Passwords do not match!", "error");
        return;
    }

    users.push({ username, email, password });

    showMessage("Signup successful!", "success");
    toggleForm();
}

function login(username, password) {
    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
        showMessage("Login successful!", "success");

        setTimeout(() => {
            window.location.href = "home.html";
        }, 1000);

    } else {
        showMessage("Invalid username or password!", "error");
    }
}

function togglePassword(id, icon) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.textContent = "👁️‍🗨️";
    } else {
        input.type = "password";
        icon.textContent = "👁";
    }
}

function showMessage(msg, type) {
    const messageDiv = document.getElementById("message");
    messageDiv.innerText = msg;
    messageDiv.className = "message " + type;
}

function clearMessage() {
    document.getElementById("message").innerText = "";
}
</script>

</body>
</html>
